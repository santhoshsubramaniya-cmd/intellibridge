name: smartplace
description: AI-Powered Campus-to-Career Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0
  firebase_storage: ^11.6.0
  firebase_messaging: ^14.7.0

  # Google Generative AI (Gemini)
  google_generative_ai: ^0.4.0

  # UI & Animations
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  cached_network_image: ^3.3.1
  fl_chart: ^0.68.0
  shimmer: ^3.0.0

  # File & Media
  file_picker: ^8.0.0
  image_picker: ^1.0.7
  url_launcher: ^6.2.5

  # Utils
  shared_preferences: ^2.2.3
  http: ^1.2.1
  intl: ^0.19.0
  flutter_dotenv: ^5.1.0
  provider: ^6.1.2
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - .env
  # Uncomment below ONLY after downloading Syne fonts
